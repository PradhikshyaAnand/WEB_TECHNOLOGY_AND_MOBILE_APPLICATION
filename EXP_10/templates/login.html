<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AquaPredict</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
background: linear-gradient(135deg, #137fec, #00c6ff);
font-family: 'Inter', sans-serif;
}
.glass {
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
border: 1px solid rgba(255,255,255,0.3);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-8 rounded-xl shadow-xl w-full max-w-md text-center text-white">

<h2 class="text-3xl font-bold mb-6">AquaPredict Login</h2>

<form action="/login" method="POST" class="space-y-4">

<input type="text" name="username" placeholder="Username"
class="w-full px-4 py-3 rounded-lg text-black outline-none"/>

<input type="password" name="password" placeholder="Password"
class="w-full px-4 py-3 rounded-lg text-black outline-none"/>

<button type="submit"
class="w-full bg-white text-blue-600 font-bold py-3 rounded-lg hover:bg-gray-200 transition">
Login
</button>

</form>

<p class="mt-4 text-sm">
Don't have an account?
<a href="/register" class="underline font-semibold">Register</a>
</p>

</div>

</body>
</html>
