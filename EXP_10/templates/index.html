<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Quality Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
}

/* Result box */
#resultContainer {
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

/* Card Style */
.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 16px;
}

/* Input styling */
.input-box {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #93c5fd;
    outline: none;
}

.input-box:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 5px rgba(59,130,246,0.5);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-gray-800">

<div class="w-full max-w-5xl p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-blue-900">Water Quality Dashboard</h1>
    <a href="/logout" class="bg-red-500 px-4 py-2 rounded text-white hover:bg-red-600">Logout</a>
</div>

<!-- RESULT DISPLAY (TOP CENTER) -->
<div id="resultContainer" class="hidden mb-6">
    <div id="resultIcon" class="text-5xl mb-2"></div>
    <div id="resultText" class="text-3xl font-bold"></div>
</div>

<!-- CARD -->
<div class="card p-8 shadow-2xl">

<h2 class="text-2xl font-semibold mb-6 text-center text-blue-800">
Enter Water Parameters
</h2>

<form id="predictForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

<!-- Inputs -->
<div>
<label class="text-sm font-semibold text-blue-700">pH</label>
<input type="number" step="any" id="ph" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Turbidity</label>
<input type="number" step="any" id="turbidity" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Sulfate</label>
<input type="number" step="any" id="sulfate" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Conductivity</label>
<input type="number" step="any" id="conductivity" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Chloramines</label>
<input type="number" step="any" id="chloramines" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Trihalomethanes</label>
<input type="number" step="any" id="trihalomethanes" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Hardness</label>
<input type="number" step="any" id="hardness" class="input-box w-full" required>
</div>

<div>
<label class="text-sm font-semibold text-blue-700">Organic Carbon</label>
<input type="number" step="any" id="organic_carbon" class="input-box w-full" required>
</div>

<div class="md:col-span-2">
<label class="text-sm font-semibold text-blue-700">Solids</label>
<input type="number" step="any" id="solids" class="input-box w-full" required>
</div>

<!-- BUTTON -->
<button type="submit" class="md:col-span-2 bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 font-semibold shadow-lg transition">
    Predict Water Quality
</button>

</form>

</div>

<!-- HISTORY -->
<div class="mt-8">
    <h3 class="text-lg font-semibold text-blue-900 text-center">Recent History</h3>
    <ul id="historyList" class="mt-3 text-center text-sm text-gray-700"></ul>
</div>

</div>

<script>
document.getElementById("predictForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    try {
        const data = {
            ph: document.getElementById("ph").value,
            turbidity: document.getElementById("turbidity").value,
            sulfate: document.getElementById("sulfate").value,
            conductivity: document.getElementById("conductivity").value,
            chloramines: document.getElementById("chloramines").value,
            trihalomethanes: document.getElementById("trihalomethanes").value,
            hardness: document.getElementById("hardness").value,
            organic_carbon: document.getElementById("organic_carbon").value,
            solids: document.getElementById("solids").value
        };

        const res = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

        // RESULT UI
        const resultContainer = document.getElementById("resultContainer");
        const resultText = document.getElementById("resultText");
        const resultIcon = document.getElementById("resultIcon");

        resultContainer.classList.remove("hidden");

        if(result.prediction ==="Potable Water"){
            resultText.innerText = result.prediction;
            resultIcon.innerText = "✔";

            resultContainer.style.backgroundColor = "#dcfce7";
            resultText.style.color = "#166534";
            resultIcon.style.color = "#16a34a";
        } else {
            resultText.innerText = result.prediction;
            resultIcon.innerText = "✖";

            resultContainer.style.backgroundColor = "#fee2e2";
            resultText.style.color = "#991b1b";
            resultIcon.style.color = "#dc2626";
        }

        loadHistory();

    } catch (err) {
        console.log("ERROR:", err);
        alert("Something went wrong!");
    }
});

async function loadHistory() {
    try {
        const res = await fetch("/history");
        const data = await res.json();

        const list = document.getElementById("historyList");
        list.innerHTML = "";

        data.forEach(item => {
            const li = document.createElement("li");
            li.innerText = `pH: ${item[0]} → ${item[1]} (${item[2]})`;
            list.appendChild(li);
        });
    } catch (e) {
        console.log("History error:", e);
    }
}

loadHistory();
</script>

</body>
</html>
